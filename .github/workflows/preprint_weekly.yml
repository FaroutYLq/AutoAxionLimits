name: Weekly Preprint Update Checker

on:
  schedule:
    - cron: '0 10 * * 1'  # Monday 10 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print actions without writing files or opening PRs)'
        required: false
        default: 'false'
      init_only:
        description: 'Init only: populate preprint_versions.json, no PRs'
        required: false
        default: 'false'

jobs:
  preprint-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pipeline dependencies
        run: pip install -r requirements_pipeline.txt

      - name: Run preprint update checker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.init_only }}" = "true" ]; then
            ARGS="$ARGS --init-only"
          fi
          python -m pipeline.preprint_checker $ARGS

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preprint-logs-${{ github.run_id }}
          path: pipeline/logs/
          if-no-files-found: ignore
          retention-days: 7
