name: Daily arXiv Digest

on:
  schedule:
    - cron: '0 9 * * *'   # 9 AM UTC daily (after arXiv nightly update)
  workflow_dispatch:
    inputs:
      arxiv_id:
        description: 'Force-process a specific arXiv ID (optional)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (print actions without writing files)'
        required: false
        default: 'false'

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_pipeline.txt

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install pipeline dependencies
        run: pip install -r requirements_pipeline.txt

      # FIX: pass inputs via env vars, never interpolate directly into shell (prevents injection)
      - name: Run daily arXiv digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_ARXIV_ID: ${{ github.event.inputs.arxiv_id }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=""
          if [ -n "$INPUT_ARXIV_ID" ]; then
            ARGS="$ARGS --arxiv-id $INPUT_ARXIV_ID"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m pipeline.orchestrator $ARGS

      - name: Commit updated state via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet pipeline/state/; then
            echo "No state changes to commit"
          else
            BRANCH="chore/update-pipeline-state-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add pipeline/state/
            git commit -m "chore: update pipeline state [skip ci]"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "chore: update pipeline state" \
              --body "Auto-generated state update from daily arXiv digest run." \
              --base master \
              --repo FaroutYLq/AutoAxionLimits
            gh pr merge "$BRANCH" --squash --auto --repo FaroutYLq/AutoAxionLimits
          fi

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: pipeline/logs/
          if-no-files-found: ignore
          retention-days: 7
