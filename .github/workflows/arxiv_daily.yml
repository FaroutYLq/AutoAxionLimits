name: Daily arXiv Digest

on:
  schedule:
    - cron: '0 9 * * *'   # 9 AM UTC daily (after arXiv nightly update)
  workflow_dispatch:
    inputs:
      arxiv_id:
        description: 'Force-process a specific arXiv ID (optional)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (print actions without writing files)'
        required: false
        default: 'false'

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pipeline dependencies
        run: pip install -r requirements_pipeline.txt

      - name: Run daily arXiv digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.arxiv_id }}" ]; then
            ARGS="$ARGS --arxiv-id ${{ github.event.inputs.arxiv_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m pipeline.orchestrator $ARGS

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: pipeline/logs/
          if-no-files-found: ignore
          retention-days: 7
